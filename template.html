<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <script>
    const CONFIG = {
      blogUrl: 'https://incomedraft.blogspot.com',
      blogName: 'Income Draft',
      itemsPerPage: 9,
      themeColor: '#0f172a',
    };
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Income Draft</title>
  <meta name="description" content="Blog" />
  <meta name="theme-color" content="#0f172a" />
  <meta property="og:title" content="Income Draft" />
  <meta property="og:description" content="Blog" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://incomedraft.blogspot.com/" />
  <meta property="og:image" content="" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Income Draft" />
  <meta name="twitter:description" content="Blog" />
  <link rel="canonical" href="https://incomedraft.blogspot.com/" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e293b'/%3E%3Ctext y='.9em' font-size='80' x='18'%3E✍%3C/text%3E%3C/svg%3E" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: { DEFAULT: '#10b981', 50: '#ecfdf5', 100: '#d1fae5', 200: '#a7f3d0', 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b' },
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'sans-serif'] },
          animation: { fade: 'fadeIn .4s ease-out' },
          keyframes: {
            fadeIn: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
          },
        },
      },
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    (function() {
      var path = window.location.pathname.replace(/\/+$/, '') || '/';
      var hash = window.location.hash;
      if (path === '/' || hash.startsWith('#/')) return;

      // Label URL → redirect directly
      var lm = path.match(/\/search\/label\/(.+)/);
      if (lm) { window.location.replace('/#/label/' + encodeURIComponent(decodeURIComponent(lm[1]))); return; }

      var isPage = path.startsWith('/p/');
      var slug = (path.match(/\/([^/]+)\.html$/) || [])[1] || path.split('/').pop();
      if (!slug) { window.location.replace('/'); return; }

      var $B = CONFIG.blogUrl;
      var cb = 'rd' + Math.random().toString(36).slice(2);
      var s = document.createElement('script');
      window[cb] = function(d) {
        try {
          var e = d.feed && d.feed.entry && d.feed.entry[0];
          if (e) {
            var id = (e.id.$t || '').match(/(?:post|page)-(\d+)/);
            id = id ? id[1] : '';
            var t = (e.title.$t || slug).toLowerCase().replace(/[^\w\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
            window.location.replace('/#/' + (isPage?'page':'post') + '/' + (t||slug) + '/' + id);
          } else { window.location.replace('/'); }
        } catch(_) { window.location.replace('/'); }
        delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s);
      };
      s.onerror = function() { window.location.replace('/'); delete window[cb]; if(s.parentNode)s.parentNode.removeChild(s); };
      s.src = $B + '/feeds/posts/default?alt=json-in-script&max-results=1&q=' + encodeURIComponent(slug.replace(/-/g,' ')) + '&callback=' + cb;
      document.head.appendChild(s);
    })();
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scrollbar-width: thin; scrollbar-color: #334155 #0f172a; }
    body { font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    .post-content h1, .post-content h2, .post-content h3, .post-content h4 { font-weight: 700; line-height: 1.3; margin-top: 2em; margin-bottom: .75em; color: #f1f5f9; }
    .post-content h1 { font-size: 1.875rem; }
    .post-content h2 { font-size: 1.5rem; border-bottom: 1px solid #1e293b; padding-bottom: .4em; }
    .post-content h3 { font-size: 1.25rem; }
    .post-content p { margin-bottom: 1.25em; line-height: 1.75; color: #cbd5e1; }
    .post-content a { color: #34d399; text-decoration: underline; text-underline-offset: 2px; }
    .post-content a:hover { color: #6ee7b7; }
    .post-content img, .post-content iframe { max-width: 100%; height: auto; border-radius: .75rem; margin: 1.5em 0; box-shadow: 0 4px 12px rgba(0,0,0,.3); }
    .post-content blockquote { border-left: 4px solid #10b981; padding: .75em 1.25em; margin: 1.5em 0; background: #0f172a; border-radius: 0 .5rem .5rem 0; color: #94a3b8; font-style: italic; }
    .post-content pre { background: #020617; border: 1px solid #1e293b; border-radius: .75rem; padding: 1.25em; overflow-x: auto; margin: 1.5em 0; font-size: .875rem; line-height: 1.6; }
    .post-content code { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: .875em; background: #1e293b; padding: .15em .4em; border-radius: .25rem; }
    .post-content pre code { background: none; padding: 0; border-radius: 0; font-size: .875rem; }
    .post-content ul, .post-content ol { margin: 1em 0 1.25em 1.5em; color: #cbd5e1; }
    .post-content li { margin-bottom: .4em; line-height: 1.7; }
    .post-content hr { border: none; border-top: 1px solid #1e293b; margin: 2em 0; }
    .post-content table { width: 100%; border-collapse: collapse; margin: 1.5em 0; }
    .post-content th, .post-content td { border: 1px solid #1e293b; padding: .75em 1em; text-align: left; }
    .post-content th { background: #1e293b; font-weight: 600; color: #f1f5f9; }
    .post-content td { color: #cbd5e1; }

    .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: .5rem; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .nav-blur { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); background: rgba(15,23,42,.85); }

    .card-hover { transition: transform .2s ease, box-shadow .2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }

    .post-content iframe[src*="youtube"] { aspect-ratio: 16/9; width: 100%; border-radius: .75rem; }
    [x-cloak] { display: none !important; }
    .line-clamp-1 { overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 1; }
    .line-clamp-2 { overflow: hidden; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
  </style>
</head>
<body class="antialiased" x-data="app()">

  <!-- Skip link -->
  <a href="#main" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-50 focus:px-4 focus:py-2 focus:bg-accent focus:text-slate-900 focus:rounded-lg focus:font-semibold">Skip to content</a>

  <!-- Navbar -->
  <header class="fixed top-0 left-0 right-0 z-40 nav-blur border-b border-slate-800/60">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="#" @click.prevent="navigate('home')" class="text-xl font-bold text-white tracking-tight hover:text-accent transition-colors">
          <span class="text-accent">&lt;</span>
          <span x-text="blogName">Blog</span>
          <span class="text-accent">/&gt;</span>
        </a>

        <nav class="hidden md:flex items-center gap-1">
          <template x-for="pg in pages" :key="pg.id">
            <a href="#" @click.prevent="navigate('post', pg.id, 'page')" class="px-3 py-2 text-sm text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors" x-text="pg.title"></a>
          </template>
          <button @click="openSearch = true" class="ml-2 p-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors" aria-label="Search">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          </button>
        </nav>

        <button @click="mobileMenu = !mobileMenu" class="md:hidden p-2 text-slate-400 hover:text-white rounded-lg" aria-label="Menu">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path x-show="!mobileMenu" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            <path x-show="mobileMenu" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Mobile menu -->
      <div x-show="mobileMenu" x-cloak x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0 -translate-y-4" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 -translate-y-4" class="md:hidden pb-4 pt-2 border-t border-slate-800/60">
        <template x-for="pg in pages" :key="pg.id">
          <a href="#" @click.prevent="navigate('post', pg.id, 'page'); mobileMenu = false" class="block px-4 py-2.5 text-sm text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors" x-text="pg.title"></a>
        </template>
        <button @click="openSearch = true; mobileMenu = false" class="w-full text-left px-4 py-2.5 text-sm text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">Search</button>
      </div>
    </div>
  </header>

  <!-- Search overlay -->
  <div x-show="openSearch" x-cloak @keydown.escape.window="openSearch = false; searchQuery = ''" class="fixed inset-0 z-50 flex items-start justify-center pt-20 px-4">
    <div class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm" @click="openSearch = false; searchQuery = ''"></div>
    <div class="relative w-full max-w-xl bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden" @click.outside="openSearch = false">
      <div class="flex items-center gap-3 px-5 py-4 border-b border-slate-700">
        <svg class="w-5 h-5 text-slate-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <input type="search" x-model="searchQuery" @input.debounce.500ms="searchPosts(searchQuery)" placeholder="Search posts..." class="flex-1 bg-transparent text-white placeholder-slate-400 outline-none text-base" x-ref="searchInput" autofocus />
        <button @click="openSearch = false; searchQuery = ''" class="text-slate-400 hover:text-white p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="max-h-96 overflow-y-auto p-2">
        <template x-if="!searchQuery">
          <p class="text-slate-500 text-sm text-center py-8">Type to search posts...</p>
        </template>
        <template x-if="searchQuery && searchLoading">
          <div class="space-y-3 p-4">
            <div class="skeleton h-16"></div>
            <div class="skeleton h-16"></div>
            <div class="skeleton h-16"></div>
          </div>
        </template>
        <template x-if="searchQuery && !searchLoading && searchResults.length === 0">
          <p class="text-slate-500 text-sm text-center py-8">No results for "<span class="text-slate-300" x-text="searchQuery"></span>"</p>
        </template>
        <template x-for="r in searchResults" :key="r.id">
          <a href="#" @click.prevent="navigate('post', r.id); openSearch = false; searchQuery = ''" class="flex items-start gap-3 p-3 rounded-xl hover:bg-slate-700/50 transition-colors group">
            <div class="min-w-0 flex-1">
              <p class="text-sm font-medium text-white group-hover:text-accent transition-colors line-clamp-1" x-text="r.title"></p>
              <p class="text-xs text-slate-400 mt-0.5" x-text="stripHtml(r.summary).substring(0, 80)"></p>
            </div>
          </a>
        </template>
      </div>
    </div>
  </div>

  <!-- Main -->
  <main id="main" class="pt-24 pb-16 min-h-screen">

    <!-- Loader -->
    <template x-if="loading && !posts.length && !currentPost">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <template x-for="i in 6" :key="i">
            <div class="bg-slate-800/50 rounded-2xl overflow-hidden border border-slate-700/50">
              <div class="skeleton h-48"></div>
              <div class="p-5 space-y-3">
                <div class="skeleton h-5 w-3/4"></div>
                <div class="skeleton h-4 w-full"></div>
                <div class="skeleton h-4 w-2/3"></div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Error -->
    <template x-if="error">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center py-20">
        <svg class="w-16 h-16 mx-auto text-slate-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <p class="text-slate-400 text-sm" x-text="error"></p>
        <button @click="fetchPosts()" class="mt-4 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg text-sm transition-colors">Retry</button>
      </div>
    </template>

    <!-- Home view -->
    <div x-show="view === 'home' && !loading && !error" x-cloak>
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center py-10 md:py-16">
          <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight">
            <span x-text="blogName"></span>
          </h1>
          <p class="mt-3 text-lg text-slate-400 max-w-lg mx-auto">Latest articles &amp; insights</p>
        </div>

        <template x-if="allLabels.length > 0">
          <div class="flex flex-wrap gap-2 justify-center mb-10">
            <button @click="currentLabel = ''; fetchPosts()" :class="currentLabel === '' ? 'bg-accent text-slate-900 font-medium' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'" class="px-3 py-1.5 text-sm rounded-full transition-colors">All</button>
            <template x-for="l in allLabels" :key="l[0]">
              <button @click="currentLabel = l[0]; fetchByLabel(l[0])" :class="currentLabel === l[0] ? 'bg-accent text-slate-900 font-medium' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'" class="px-3 py-1.5 text-sm rounded-full transition-colors" x-text="l[0] + ' (' + l[1] + ')'"></button>
            </template>
          </div>
        </template>

        <div x-show="!loading">
          <template x-if="posts.length === 0">
            <p class="text-center text-slate-500 py-20">No posts yet.</p>
          </template>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="(post, idx) in posts" :key="post.id">
              <article @click="navigate('post', post.id)" class="card-hover bg-slate-800/60 rounded-2xl overflow-hidden border border-slate-700/50 cursor-pointer group flex flex-col">
                <div class="aspect-video bg-slate-700 overflow-hidden relative">
                  <div class="skeleton absolute inset-0"></div>
                  <img x-show="post.thumbnail" :src="imgProxy(post.thumbnail)" :alt="post.title" class="relative z-10 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-0" @load="$el.classList.remove('opacity-0')" @error="$el.style.display='none'" loading="lazy" />
                  <div x-show="!post.thumbnail" class="absolute inset-0 flex items-center justify-center text-slate-600">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
                  </div>
                </div>
                <div class="p-5 flex flex-col flex-1">
                  <div class="flex flex-wrap gap-1.5 mb-2">
                    <template x-for="cat in post.categories" :key="cat">
                      <span class="text-xs px-2 py-0.5 bg-slate-700/70 text-slate-300 rounded-full" x-text="cat"></span>
                    </template>
                  </div>
                  <h2 class="text-lg font-semibold text-white group-hover:text-accent transition-colors line-clamp-2 leading-snug" x-text="post.title"></h2>
                  <p class="mt-2 text-sm text-slate-400 line-clamp-2 flex-1" x-text="stripHtml(post.summary).substring(0, 150)"></p>
                  <div class="mt-4 flex items-center gap-3 text-xs text-slate-500">
                    <span x-text="formatDate(post.published)"></span>
                    <template x-if="post.commentCount > 0">
                      <span class="flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                        <span x-text="post.commentCount"></span>
                      </span>
                    </template>
                  </div>
                </div>
              </article>
            </template>
          </div>
        </div>

        <template x-if="totalResults > itemsPerPage && !loading">
          <div class="flex items-center justify-center gap-3 mt-12">
            <button @click="currentPage > 1 && fetchPosts(currentPage - 1)" :disabled="currentPage === 1" :class="currentPage === 1 ? 'opacity-30 cursor-not-allowed' : 'hover:bg-slate-700'" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm transition-colors">Previous</button>
            <span class="text-sm text-slate-400">
              Page <span class="text-white font-medium" x-text="currentPage"></span> of <span class="text-white font-medium" x-text="totalPages"></span>
            </span>
            <button @click="currentPage < totalPages && fetchPosts(currentPage + 1)" :disabled="currentPage === totalPages" :class="currentPage === totalPages ? 'opacity-30 cursor-not-allowed' : 'hover:bg-slate-700'" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm transition-colors">Next</button>
          </div>
        </template>
      </div>
    </div>

    <!-- Post detail view -->
    <div x-show="view === 'post' && currentPost" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0">
      <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <button @click="goBack()" class="flex items-center gap-2 text-sm text-slate-400 hover:text-white transition-colors mb-8 group">
          <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          <span x-text="viewLabel === 'page' ? 'Back to home' : 'Back to posts'"></span>
        </button>

        <template x-if="currentPost && currentPost.type === 'page'">
          <article>
            <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight leading-tight" x-text="currentPost.title"></h1>
            <div class="mt-8 post-content" x-html="currentPost.content"></div>
          </article>
        </template>

        <template x-if="currentPost && currentPost.type === 'post'">
          <article>
            <div class="flex flex-wrap gap-2 mb-4">
              <template x-for="cat in currentPost.categories" :key="cat">
                <button @click="navigateLabel(cat)" class="text-xs px-2.5 py-1 bg-slate-700/70 text-slate-300 hover:bg-accent hover:text-slate-900 rounded-full transition-colors" x-text="cat"></button>
              </template>
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold text-white tracking-tight leading-tight" x-text="currentPost.title"></h1>
            <div class="mt-4 flex flex-wrap items-center gap-4 text-sm text-slate-400">
              <span>Published <time :datetime="currentPost.published" x-text="formatDate(currentPost.published)"></time></span>
              <template x-if="currentPost.updated !== currentPost.published">
                <span>Updated <time :datetime="currentPost.updated" x-text="formatDate(currentPost.updated)"></time></span>
              </template>
              <template x-if="currentPost.author">
                <span>by <span class="text-slate-300" x-text="currentPost.author"></span></span>
              </template>
              <template x-if="currentPost.commentCount > 0">
                <span class="flex items-center gap-1">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                  <span x-text="currentPost.commentCount"></span>
                </span>
              </template>
            </div>
            <div class="mt-8 post-content" x-html="currentPost.content"></div>

            <template x-if="comments.length > 0">
              <div class="mt-16 pt-8 border-t border-slate-800">
                <h2 class="text-xl font-bold text-white mb-6">Comments <span class="text-sm font-normal text-slate-400" x-text="'(' + comments.length + ')'"></span></h2>
                <div class="space-y-4">
                  <template x-for="c in comments" :key="c.id">
                    <div class="bg-slate-800/40 rounded-xl p-4 border border-slate-700/50">
                      <div class="flex items-center gap-2 mb-2">
                        <div class="w-7 h-7 rounded-full bg-slate-600 flex items-center justify-center text-xs font-medium text-white" x-text="c.author.charAt(0).toUpperCase()"></div>
                        <span class="text-sm font-medium text-white" x-text="c.author"></span>
                        <span class="text-xs text-slate-500" x-text="formatDate(c.published)"></span>
                      </div>
                      <div class="text-sm text-slate-300 post-content" x-html="c.content"></div>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </article>
        </template>
      </div>
    </div>

    <!-- Label view -->
    <div x-show="view === 'label'" x-cloak>
      <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="py-10">
          <h1 class="text-3xl font-bold text-white">Label: <span class="text-accent" x-text="currentLabel"></span></h1>
          <p class="mt-1 text-slate-400 text-sm" x-text="'Found ' + totalResults + ' posts'"></p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <template x-for="post in posts" :key="post.id">
            <article @click="navigate('post', post.id)" class="card-hover bg-slate-800/60 rounded-2xl overflow-hidden border border-slate-700/50 cursor-pointer group flex flex-col">
              <div class="aspect-video bg-slate-700 overflow-hidden relative">
                <div class="skeleton absolute inset-0"></div>
                <img x-show="post.thumbnail" :src="imgProxy(post.thumbnail)" :alt="post.title" class="relative z-10 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-0" @load="$el.classList.remove('opacity-0')" @error="$el.style.display='none'" loading="lazy" />
                <div x-show="!post.thumbnail" class="absolute inset-0 flex items-center justify-center text-slate-600">
                  <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
                </div>
              </div>
              <div class="p-5 flex-1">
                <h2 class="text-lg font-semibold text-white group-hover:text-accent transition-colors line-clamp-2" x-text="post.title"></h2>
                <p class="mt-2 text-sm text-slate-400 line-clamp-2" x-text="stripHtml(post.summary).substring(0, 150)"></p>
                <div class="mt-3 text-xs text-slate-500" x-text="formatDate(post.published)"></div>
              </div>
            </article>
          </template>
        </div>
        <template x-if="totalResults > itemsPerPage">
          <div class="flex items-center justify-center gap-3 mt-12">
            <button @click="currentPage > 1 && fetchByLabel(currentLabel, currentPage - 1)" :disabled="currentPage === 1" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm transition-colors disabled:opacity-30">Previous</button>
            <span class="text-sm text-slate-400" x-text="'Page ' + currentPage + ' of ' + totalPages"></span>
            <button @click="currentPage < totalPages && fetchByLabel(currentLabel, currentPage + 1)" :disabled="currentPage === totalPages" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm transition-colors disabled:opacity-30">Next</button>
          </div>
        </template>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-800/60 py-8">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-slate-500">
      <p>&copy; <span x-text="new Date().getFullYear()"></span> <span x-text="blogName"></span>. Powered by <a href="https://www.blogger.com" target="_blank" rel="noopener" class="text-slate-400 hover:text-white transition-colors">Blogger</a>.</p>
    </div>
  </footer>

  <!-- Scroll to top -->
  <button x-show="scrolled" @click="window.scrollTo({top:0,behavior:'smooth'})" x-cloak x-transition class="fixed bottom-6 right-6 z-40 p-3 bg-slate-800 hover:bg-slate-700 text-white rounded-full shadow-lg border border-slate-700 transition-colors" aria-label="Scroll to top">
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
  </button>

  <script>
    const BLOG_URL = CONFIG.blogUrl;

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const cb = 'jp' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');
        const timeout = setTimeout(() => {
          delete window[cb];
          script.remove();
          reject(new Error('JSONP timeout'));
        }, 10000);
        window[cb] = (data) => {
          clearTimeout(timeout);
          delete window[cb];
          script.remove();
          resolve(data);
        };
        script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cb;
        script.onerror = () => {
          clearTimeout(timeout);
          delete window[cb];
          script.remove();
          reject(new Error('JSONP load error'));
        };
        document.body.appendChild(script);
      });
    }

    function app() {
      return {
        blogName: CONFIG.blogName,
        blogUrl: CONFIG.blogUrl,
        view: 'home',
        viewLabel: '',
        posts: [],
        pages: [],
        currentPost: null,
        comments: [],
        loading: true,
        error: '',
        searchQuery: '',
        searchResults: [],
        searchLoading: false,
        openSearch: false,
        currentLabel: '',
        allLabels: [],
        currentPage: 1,
        totalResults: 0,
        itemsPerPage: CONFIG.itemsPerPage,
        mobileMenu: false,
        scrolled: false,

        get totalPages() {
          return Math.ceil(this.totalResults / this.itemsPerPage) || 1;
        },

        init() {
          window.addEventListener('scroll', () => { this.scrolled = window.scrollY > 400 });
          this.fetchPages();
          const hash = window.location.hash.slice(1);
          if (hash && hash !== '/') {
            this.handleRoute();
          } else {
            this.fetchPosts();
          }
          this.fetchAllLabels();
          window.addEventListener('popstate', (e) => {
            const s = e.state;
            if (s) {
              this.view = s.view || 'home';
              this.currentPost = s.currentPost || null;
              this.currentLabel = s.currentLabel || '';
              this.currentPage = s.currentPage || 1;
              this.posts = s.posts || [];
              this.comments = s.comments || [];
              if (s.view === 'post' && s.currentPost) {
                this.updateSeo(s.currentPost.type || 'post', s.currentPost);
              } else if (s.view === 'label' && s.currentLabel) {
                this.updateSeo('label', s.currentLabel);
              } else {
                this.updateSeo('home');
              }
              if (s.view === 'post' && !this.currentPost && s.postId) {
                this.fetchPost(s.postId);
              }
            }
          });
          window.addEventListener('hashchange', () => this.handleRoute());
        },

        $clone(obj) { return JSON.parse(JSON.stringify(obj)) },

        updateSeo(type, data) {
          const blogName = this.blogName;
          let title = blogName;
          let desc = 'Latest articles & insights';
          let url = window.location.href.split('#')[0];
          let image = '';
          if (type === 'post' && data) {
            title = data.title + ' | ' + blogName;
            desc = this.stripHtml(data.summary).substring(0, 160);
            image = data.thumbnail || '';
            url = url + '#/post/' + data.slug + '/' + data.id;
          } else if (type === 'page' && data) {
            title = data.title + ' | ' + blogName;
            desc = this.stripHtml(data.summary || data.content || '').substring(0, 160);
            url = url + '#/page/' + data.slug + '/' + data.id;
          } else if (type === 'label' && data) {
            title = data + ' - ' + blogName;
            desc = 'Posts tagged with ' + data;
            url = url + '#/label/' + encodeURIComponent(data);
          }
          document.title = title;
          document.querySelector('meta[name="description"]')?.setAttribute('content', desc);
          document.querySelector('meta[property="og:title"]')?.setAttribute('content', title);
          document.querySelector('meta[property="og:description"]')?.setAttribute('content', desc);
          document.querySelector('meta[property="og:url"]')?.setAttribute('content', url);
          document.querySelector('meta[property="og:image"]')?.setAttribute('content', image);
          document.querySelector('meta[name="twitter:title"]')?.setAttribute('content', title);
          document.querySelector('meta[name="twitter:description"]')?.setAttribute('content', desc);
          document.querySelector('link[rel="canonical"]')?.setAttribute('href', url);
          const existingLd = document.getElementById('ld-json');
          if (existingLd) existingLd.remove();
          if (type === 'post' && data) {
            const ld = {
              '@context': 'https://schema.org',
              '@type': 'BlogPosting',
              headline: data.title,
              description: desc,
              image: image || undefined,
              datePublished: data.published || undefined,
              dateModified: data.updated || undefined,
              author: data.author ? { '@type': 'Person', name: data.author } : undefined,
              publisher: { '@type': 'Organization', name: blogName },
              mainEntityOfPage: { '@type': 'WebPage', '@id': url },
            };
            const script = document.createElement('script');
            script.id = 'ld-json';
            script.type = 'application/ld+json';
            script.textContent = JSON.stringify(Object.fromEntries(Object.entries(ld).filter(([_, v]) => v !== undefined)));
            document.head.appendChild(script);
          }
        },

        postIdFromTag(tag) {
          const m = tag.match(/(?:post|page)-(\d+)/);
          return m ? m[1] : tag;
        },

        slugify(text) {
          return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
        },

        parseAuthor(authorArr) {
          const name = authorArr?.[0]?.name?.$t || '';
          const trimmed = name.trim();
          if (!trimmed || trimmed === 'Unknown' || trimmed === 'Anonymous') return 'Admin';
          return trimmed;
        },

        slugFromUrl(url) {
          if (!url) return '';
          const m = url.match(/\/([^/]+)\.html$/);
          return m ? m[1] : '';
        },

        parseEntry(entry, type = 'post') {
          const links = {};
          (entry.link || []).forEach(l => { links[l.rel] = l.href });
          let thumb = entry.media$thumbnail?.url || '';
          if (thumb) { thumb = thumb.replace(/\/s72-c(\/|$)/, '/s400-c$1') }
          if (!thumb && type === 'post') {
            const m = (entry.content?.$t || '').match(/<img[^>]+src=["']([^"']+)["']/i);
            if (m) thumb = m[1];
          }
          const altLink = links.alternate || '';
          return {
            id: this.postIdFromTag(entry.id.$t),
            title: entry.title.$t || 'Untitled',
            slug: this.slugFromUrl(altLink) || this.slugify(entry.title?.$t || 'untitled'),
            content: entry.content?.$t || '',
            summary: entry.summary?.$t || '',
            published: entry.published?.$t || '',
            updated: entry.updated?.$t || '',
            author: this.parseAuthor(entry.author),
            categories: (entry.category || []).map(c => c.term).filter(t => t !== 'http://schemas.google.com/blogger/2008/kind#post' && t !== 'http://schemas.google.com/blogger/2008/kind#page'),
            thumbnail: thumb,
            link: links.alternate || links.self || '',
            commentCount: entry['thr$total']?.$t ? parseInt(entry['thr$total'].$t) : 0,
            type: type,
          };
        },

        async fetchPosts(page = 1) {
          this.loading = true;
          this.error = '';
          this.currentPage = page;
          this.view = 'home';
          this.currentPost = null;
          this.comments = [];
          const startIndex = (page - 1) * this.itemsPerPage + 1;
          try {
            const data = await jsonp(`${BLOG_URL}/feeds/posts/default?alt=json-in-script&max-results=${this.itemsPerPage}&start-index=${startIndex}`);
            const feed = data.feed;
            this.posts = (feed.entry || []).map(e => this.parseEntry(e, 'post'));
            this.totalResults = parseInt(feed['openSearch$totalResults']?.$t || '0');
            this.updateSeo('home');
            history.pushState(this.$clone({ view: 'home', currentPage: page, posts: this.posts, currentLabel: '' }), '', '#');
          } catch (e) {
            this.error = 'Failed to load posts: ' + e.message;
          } finally {
            this.loading = false;
          }
        },

        async fetchPages() {
          try {
            const data = await jsonp(`${BLOG_URL}/feeds/pages/default?alt=json-in-script&max-results=50`);
            this.pages = (data.feed.entry || []).map(e => this.parseEntry(e, 'page'));
          } catch (_) {}
        },

        async fetchPost(id) {
          this.loading = true;
          this.error = '';
          this.view = 'post';
          this.currentPost = null;
          this.comments = [];
          try {
            const data = await jsonp(`${BLOG_URL}/feeds/posts/default/${id}?alt=json-in-script`);
            this.currentPost = this.parseEntry(data.entry, 'post');
            this.fetchComments(id);
            this.updateSeo('post', this.currentPost);
            history.pushState(this.$clone({ view: 'post', postId: id, currentPost: this.currentPost, currentLabel: this.currentLabel }), '', '#/post/' + this.currentPost.slug + '/' + id);
          } catch (e) {
            this.error = 'Failed to load post: ' + e.message;
          } finally {
            this.loading = false;
          }
        },

        async fetchComments(postId) {
          try {
            const data = await jsonp(`${BLOG_URL}/feeds/${postId}/comments/default?alt=json-in-script&max-results=50`);
            this.comments = (data.feed.entry || []).map(c => ({
              id: this.postIdFromTag(c.id.$t),
              author: c.author?.[0]?.name?.$t || 'Anonymous',
              published: c.published?.$t || '',
              content: c.content?.$t || c.title?.$t || '',
            }));
          } catch (_) {}
        },

        async fetchByLabel(label, page = 1) {
          this.loading = true;
          this.error = '';
          this.currentLabel = label;
          this.currentPage = page;
          this.view = 'label';
          this.currentPost = null;
          const startIndex = (page - 1) * this.itemsPerPage + 1;
          const labelEnc = encodeURIComponent(label);
          try {
            const data = await jsonp(`${BLOG_URL}/feeds/posts/default/-/${labelEnc}?alt=json-in-script&max-results=${this.itemsPerPage}&start-index=${startIndex}`);
            this.posts = (data.feed.entry || []).map(e => this.parseEntry(e, 'post'));
            this.totalResults = parseInt(data.feed['openSearch$totalResults']?.$t || '0');
            this.updateSeo('label', label);
            history.pushState(this.$clone({ view: 'label', currentLabel: label, currentPage: page, posts: this.posts }), '', '#/label/' + label);
          } catch (e) {
            this.error = 'Failed to load posts: ' + e.message;
          } finally {
            this.loading = false;
          }
        },

        async searchPosts(q) {
          if (!q.trim()) { this.searchResults = []; return; }
          this.searchLoading = true;
          try {
            const data = await jsonp(`${BLOG_URL}/feeds/posts/default?alt=json-in-script&max-results=25&q=${encodeURIComponent(q)}`);
            this.searchResults = (data.feed.entry || []).map(e => this.parseEntry(e, 'post'));
          } catch (_) {
            this.searchResults = [];
          } finally {
            this.searchLoading = false;
          }
        },

        navigate(view, id, type) {
          if (view === 'home') {
            this.fetchPosts();
          } else if (view === 'post' && id) {
            this.viewLabel = type || 'post';
            if (type === 'page') {
              this.loadPage(id);
            } else {
              this.fetchPost(id);
            }
          }
        },

        navigateLabel(label) {
          this.currentLabel = label;
          this.fetchByLabel(label);
        },

        async loadPage(id) {
          this.loading = true;
          this.error = '';
          this.view = 'post';
          this.currentPost = null;
          this.comments = [];
          this.viewLabel = 'page';
          try {
            const data = await jsonp(`${BLOG_URL}/feeds/pages/default/${id}?alt=json-in-script`);
            this.currentPost = this.parseEntry(data.entry, 'page');
            this.updateSeo('page', this.currentPost);
            history.pushState(this.$clone({ view: 'post', postId: id, currentPost: this.currentPost }), '', '#/page/' + this.currentPost.slug + '/' + id);
          } catch (e) {
            this.error = 'Failed to load page: ' + e.message;
          } finally {
            this.loading = false;
          }
        },

        handleRoute() {
          const hash = window.location.hash.slice(1);
          if (!hash || hash === '/' || hash === '') { return }
          const parts = hash.split('/');
          if (parts[1] === 'post' && parts[3]) { this.fetchPost(parts[3]); return }
          if (parts[1] === 'page' && parts[3]) { this.viewLabel = 'page'; this.loadPage(parts[3]); return }
          if (parts[1] === 'label' && parts[2]) { this.fetchByLabel(parts[2]); return }
        },

        async fetchAllLabels() {
          try {
            const data = await jsonp(`${BLOG_URL}/feeds/posts/default?alt=json-in-script&max-results=150`);
            const entries = data.feed.entry || [];
            const map = {};
            entries.forEach(e => {
              (e.category || []).forEach(c => {
                const term = c.term;
                if (term !== 'http://schemas.google.com/blogger/2008/kind#post' && term !== 'http://schemas.google.com/blogger/2008/kind#page') {
                  map[term] = (map[term] || 0) + 1;
                }
              });
            });
            this.allLabels = Object.entries(map).sort((a, b) => b[1] - a[1]);
          } catch (_) {}
        },

        goBack() {
          window.history.back();
        },

        formatDate(dateStr) {
          if (!dateStr) return '';
          const d = new Date(dateStr);
          return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        },

        imgProxy(url) {
          if (!url) return '';
          if (url.includes('images.weserv.nl')) return url;
          return `https://images.weserv.nl/?url=${encodeURIComponent(url)}&w=640&h=360&fit=cover&output=webp&q=80`;
        },

        stripHtml(html) {
          if (!html) return '';
          const div = document.createElement('div');
          div.innerHTML = html;
          return div.textContent || div.innerText || '';
        },
      }
    }
  </script>
</body>
